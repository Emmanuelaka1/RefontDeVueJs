# ══════════════════════════════════════════════════════════════════
# Profil VAL — Validation (tests d'intégration)
# ══════════════════════════════════════════════════════════════════
thrift:
  client:
    topaze:
      host: ${TOPAZE_THRIFT_HOST:topaze-val.arkea.local}
      port: ${TOPAZE_THRIFT_PORT:9090}
      timeout: 10000
      pool:
        max-total: 4
        max-idle: 2
        min-idle: 1

# ── SIGAC Loans REST ─────────────────────────────────────────────
sigac:
  loans:
    base-url: ${SIGAC_LOANS_BASE_URL:http://sigac-val.arkea.local:8080/api/v1}

logging:
  level:
    com.arkea.sgesapi: DEBUG
    org.apache.thrift: INFO
