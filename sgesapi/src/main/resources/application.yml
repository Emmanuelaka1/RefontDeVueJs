server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: sgesapi
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
    # Profils disponibles : dev | val | rec | hml | prod

# ── Thrift Client Topaze (défauts communs) ────────────────────────
# Host et port sont surchargés par profil dans application-{profil}.yml
thrift:
  client:
    topaze:
      host: ${TOPAZE_THRIFT_HOST:localhost}
      port: ${TOPAZE_THRIFT_PORT:9090}
      timeout: ${TOPAZE_THRIFT_TIMEOUT:5000}
      pool:
        max-total: ${TOPAZE_POOL_MAX_TOTAL:8}
        max-idle: ${TOPAZE_POOL_MAX_IDLE:4}
        min-idle: ${TOPAZE_POOL_MIN_IDLE:1}
        test-on-borrow: true
        test-while-idle: true

# ── JWT ────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvclNnZXNBcGlKd3RUb2tlbjIwMjQ=}
  expiration: 86400000  # 24 heures en ms

# ── OpenAPI / Swagger UI ───────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ── Actuator ───────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ────────────────────────────────────────────────────────
logging:
  level:
    com.arkea.sgesapi: DEBUG
    org.apache.thrift: WARN
