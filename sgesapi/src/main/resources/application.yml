server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: sgesapi

# ── Thrift Client Topaze ───────────────────────────────────────────
thrift:
  client:
    topaze:
      host: ${TOPAZE_THRIFT_HOST:192.168.1.100}
      port: ${TOPAZE_THRIFT_PORT:9090}
      timeout: 5000

# ── JWT ────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:bXlTdXBlclNlY3JldEtleUZvclNnZXNBcGlKd3RUb2tlbjIwMjQ=}
  expiration: 86400000  # 24 heures en ms

# ── OpenAPI / Swagger UI ───────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ── Actuator ───────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ────────────────────────────────────────────────────────
logging:
  level:
    com.arkea.sgesapi: DEBUG
    org.apache.thrift: WARN
