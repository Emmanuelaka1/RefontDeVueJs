# ══════════════════════════════════════════════════════════════════
# Profil PROD — Production
# ══════════════════════════════════════════════════════════════════
thrift:
  client:
    topaze:
      host: ${TOPAZE_THRIFT_HOST:topaze.arkea.local}
      port: ${TOPAZE_THRIFT_PORT:9090}
      timeout: 5000
      pool:
        max-total: 16
        max-idle: 8
        min-idle: 4

# ── SIGAC Loans REST ─────────────────────────────────────────────
sigac:
  loans:
    base-url: ${SIGAC_LOANS_BASE_URL:http://sigac.arkea.local:8080/api/v1}

logging:
  level:
    com.arkea.sgesapi: WARN
    org.apache.thrift: ERROR
